name: Changeset check

# Require a changeset on any PR that changes publishable package SOURCE, so a
# release-worthy change can never merge un-versioned again (the gap that left
# Keyframes align/vAlign + slot bindings merged without a changeset and needed a
# retroactive one). A no-release change (refactor/test-only) satisfies the gate
# with an empty changeset: `pnpm changeset --empty`.
#
# Skips the changesets bot's own "Version Packages" PR, which CONSUMES changesets.
on:
  pull_request:
    branches: [main]

jobs:
  changeset:
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a changeset when package source changes
        run: |
          base="origin/${{ github.base_ref }}"
          changed="$(git diff --name-only "$base"...HEAD -- packages/ | grep '/src/' || true)"
          if [ -z "$changed" ]; then
            echo "No package source changed in this PR — changeset not required."
            exit 0
          fi
          echo "Package source changed:"
          echo "$changed" | sed 's/^/  - /'
          if ls .changeset/*.md 2>/dev/null | grep -qvi 'readme'; then
            echo "✓ Changeset present."
            exit 0
          fi
          echo "::error::Package source changed but no changeset was added. Run \`pnpm changeset\` (or \`pnpm changeset --empty\` for a no-release change) and commit the file."
          exit 1
