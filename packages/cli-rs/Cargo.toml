[package]
name = "onda-cli"
description = "The ONDA command-line tool: render a scene-graph JSON document to an image. The universal adapter — anything that emits the scene-graph JSON (React, AI, hand-authored) renders through here."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[[bin]]
name = "onda"
path = "src/main.rs"

[dependencies]
onda-core = { workspace = true }
onda-scene = { workspace = true }
onda-animation = { workspace = true }
onda-renderer = { workspace = true, features = ["png", "gif", "parallel"] }
onda-vello = { workspace = true }
onda-svg = { workspace = true }
onda-image = { workspace = true }
onda-layout = { workspace = true }
onda-typography = { workspace = true }
onda-audio = { workspace = true, features = ["native-io"] }
# Geometry for the structural lint: affine compose (incl. rotation, matching the
# Vello backend) + transformed-rect bounding box. Already in the tree via Vello.
kurbo = { workspace = true }
# Native video-frame decode for export (shells out to ffmpeg). Behind the `video`
# feature so the default build needs no ffmpeg at build time and stays lean.
onda-video = { workspace = true, optional = true }
serde_json = { workspace = true }
anyhow = { workspace = true }

[features]
# Decode <Video> frames during `onda export` (requires the ffmpeg binary at run
# time — the same one the .mp4 encoder uses). Build with `--features video`.
video = ["dep:onda-video"]
