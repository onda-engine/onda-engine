[package]
name = "onda-renderer"
description = "ONDA's renderer. v0 is a CPU reference rasterizer (Scene -> RGBA framebuffer); the wgpu/GPU backend builds on the same contract."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[dependencies]
onda-core = { workspace = true }
onda-scene = { workspace = true }
onda-typography = { workspace = true }
png = { version = "0.18.1", optional = true }
gif = { version = "0.14", optional = true }

[features]
png = ["dep:png"]
gif = ["dep:gif"]

# Examples only: lets the animation demo evaluate a timeline before rendering.
# A dev-dependency, so the renderer keeps no production dependency on animation
# (and there is no cycle: onda-animation does not depend on the renderer).
[dev-dependencies]
onda-animation = { workspace = true }

[[example]]
name = "hello_onda"
required-features = ["png"]

[[example]]
name = "animated_hello"
required-features = ["png"]
