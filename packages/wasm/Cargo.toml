[package]
name = "onda-wasm"
description = "WebAssembly bindings for the ONDA renderer — the real native engine running in the browser (no DOM, no Chromium)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

# wasm-only: the bindings and engine deps are pulled in only when targeting
# wasm32, so the native workspace build stays untouched (the crate is empty on
# native — see the `#![cfg(target_arch = "wasm32")]` in src/lib.rs).
[target.'cfg(target_arch = "wasm32")'.dependencies]
onda-renderer = { workspace = true }
onda-scene = { workspace = true }
onda-core = { workspace = true }
onda-typography = { workspace = true }
onda-image = { workspace = true }
onda-layout = { workspace = true }
serde_json = { workspace = true }
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"
