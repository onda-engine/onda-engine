[package]
name = "onda-wasm-audio"
description = "WebAssembly bindings for ONDA audio analysis — decode + FFT spectrum in the browser (and Node), for audio-reactive visuals. Identical math to the native export."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

# wasm-only: deps pulled in only when targeting wasm32, so the native workspace
# build stays untouched (the crate is empty on native — see the
# `#![cfg(target_arch = "wasm32")]` in src/lib.rs). onda-audio is taken WITHOUT
# `native-io` (no std::fs) — it decodes from bytes here.
[target.'cfg(target_arch = "wasm32")'.dependencies]
onda-audio = { workspace = true }
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"
