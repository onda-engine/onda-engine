[package]
name = "onda-vello"
description = "ONDA's GPU-native vector renderer (Vello): paths, strokes, AA, rounded rects, native glyph text."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[dependencies]
onda-core = { workspace = true }
onda-scene = { workspace = true }
onda-typography = { workspace = true }
pollster = "0.4"
vello = "0.3.0"
# Async buffer-map readback (works on the web, where poll(Wait) can't block).
futures-intrusive = "0.5"
i_overlay = { version = "4.5.2", default-features = false }
# 3D math (Mat4/Vec3/Quat) for the perspective 3D pass — the standard graphics
# linear-algebra crate; pure Rust, builds for wasm32. bytemuck casts the per-quad
# uniform to bytes for upload. (No reinventing matrices/projection by hand.)
glam = "0.29"
bytemuck = { version = "1", features = ["derive"] }
# 2D path → triangle tessellation for EXTRUDED 3D meshes (front/back faces). The
# standard Rust path tessellator (handles holes/winding); pure Rust, builds wasm32.
# The side walls + normals we build ourselves from the flattened contours.
lyon = "1.0"
# Glyph OUTLINE extraction for EXTRUDED 3D TEXT — the same fontations/skrifa stack
# Vello already uses, so it's in the tree. We pull each glyph's vector outline as a
# kurbo path, then extrude it. Pure Rust, builds wasm32.
skrifa = "0.22"

# On the web, enable wgpu's WebGPU backend. Its wasm default is WebGL2, which
# lacks the compute shaders Vello requires; this feature-unifies with vello's
# wgpu 22 so the browser gets a real (compute-capable) WebGPU adapter.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { version = "22", features = ["webgpu"] }

[dev-dependencies]
png = "0.18"
