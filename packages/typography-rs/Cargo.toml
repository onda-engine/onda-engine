[package]
name = "onda-typography"
description = "ONDA typography: text shaping, layout, and glyph rasterization (cosmic-text + swash) into renderer-agnostic coverage masks."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[dependencies]
cosmic-text = "0.17.0"
onda-core = { workspace = true }
# Only for the `Script` type in our no-op Fallback impl. Pinned to match
# cosmic-text's transitive version so the trait's signature type unifies.
unicode-script = "0.5"
