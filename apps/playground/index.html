<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ONDA Player — a real-time, browser-free preview of GPU-native motion graphics, rendered by the actual Rust engine in WebAssembly."
    />
    <title>ONDA Player — GPU-native motion graphics, no browser</title>
    <link rel="icon" type="image/svg+xml" href="/onda-mark.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ONDA brand tokens (dark-first) — see assets/brand/BRAND.md. */
      :root {
        /* onda.video palette — neutral near-black + one rose accent. */
        --bg: #0e0e12;
        --bg-deep: #08080a;
        --surface: #121217;
        --surface-2: #18181d;
        --border: #26262c;
        --text: #f2f2f4;
        --text-muted: #8e8e98;
        --text-dim: #56565f;
        --accent: #d96b82;
        --accent-600: #c8576f;
        --on-accent: #0e0e12;
        --ok: #6bbf8a;
        --warn: #d9b06b;
        --font-head: "Clash Display", "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        --font-body: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        /* expose tokens/fonts to the <Player> component */
        --onda-font-body: var(--font-body);
        --onda-font-mono: var(--font-mono);
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
